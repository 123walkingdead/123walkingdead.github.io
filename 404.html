<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .container {
        text-align: center;
        color: white;
        padding: 20px;
      }
      .loader {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      h1 { font-size: 1.5rem; margin-bottom: 10px; opacity: 0.9; }
      p { font-size: 0.9rem; opacity: 0.7; }
    </style>
    <script>
      (function() {
        const pathname = window.location.pathname;
        
        const checkLoginStatus = () => {
          if (localStorage.getItem('isLoggedIn') === 'true') return true;
          try {
            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            return userInfo.isLoggedIn === true;
          } catch {
            return false;
          }
        };

        const isLoggedIn = checkLoginStatus();
        const redirect = () => {
          if (pathname === '/' || pathname === '/index.html') {
            window.location.replace(isLoggedIn ? '/home' : '/login');
            return;
          }
          if (pathname === '/login' && isLoggedIn) {
            window.location.replace('/home');
            return;
          }
          if (pathname === '/home' && !isLoggedIn) {
            window.location.replace('/login');
            return;
          }
          if (isLoggedIn) {
            window.location.replace('/#' + pathname);
            return;
          }
          window.location.replace('/login');
        };

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', redirect);
        } else {
          redirect();
        }
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <div class="loader"></div>
      <h1>正在跳转...</h1>
      <p>请稍候，即将为您导航到正确的页面</p>
    </div>
  </body>
</html>
